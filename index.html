<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praktikumsbörse - Firmendaten</title>
    <style>
        body { font-family: sans-serif; margin: 20px; line-height: 1.6; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f4f4f4; }
        h1 { color: #333; }
    </style>
</head>
<body>

    <h1>Übersicht Praktikumsplätze</h1>
    <div id="tabelle-container">Lade Praktikumsdaten...</div>

    <script>
        // Dein Link zum Google Sheet im CSV-Format
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSso11oiwfev4Yev-kslJ5cLjvMMvTe85HuohBVT1kXoWexWZgcZNLbkYC7q9jRR0e0fLdnmVahY0Ok/pub?gid=0&single=true&output=csv';

        async function ladeLiveDaten() {
            try {
                const response = await fetch(csvUrl);
                const data = await response.text();
                
                // CSV-Daten in Zeilen splitten, Header-Zeile (erste Zeile) überspringen
                const zeilen = data.split('\n').slice(1);
                
                const datenbank = zeilen.map(z => {
                    const [name, sparte, branche, tel, mail, adresse, ausbildung] = z.split(',');
                    return { name, sparte, branche, tel, mail, adresse, ausbildung };
                }).filter(b => b.name && b.name.trim() !== ""); // Nur gültige Zeilen
                
                renderTabelle(datenbank);
            } catch (error) {
                document.getElementById('tabelle-container').innerText = "Daten konnten nicht geladen werden.";
                console.error(error);
            }
        }

        function renderTabelle(daten) {
            const container = document.getElementById('tabelle-container');
            let html = `<table>
                <tr>
                    <th>Name</th><th>Sparte</th><th>Branche</th>
                    <th>Tel</th><th>Mail</th><th>Adresse</th><th>Ausbildung</th>
                </tr>`;
            
            daten.forEach(firma => {
                html += `<tr>
                    <td>${firma.name || ''}</td>
                    <td>${firma.sparte || ''}</td>
                    <td>${firma.branche || ''}</td>
                    <td>${firma.tel || ''}</td>
                    <td>${firma.mail || ''}</td>
                    <td>${firma.adresse || ''}</td>
                    <td>${firma.ausbildung || ''}</td>
                </tr>`;
            });
            
            html += '</table>';
            container.innerHTML = html;
        }

        // Starte das Laden sofort beim Seitenaufruf
        ladeLiveDaten();
    </script>
</body>
</html>
