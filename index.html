<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praktikumsbörse - TSV Geiselbullach</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #1a3c6e; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 20px auto; }
        .kachel { background: #ffffff; padding: 20px; border-radius: 12px; border-left: 5px solid #1a3c6e; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .kachel h3 { margin: 0 0 10px 0; color: #1a3c6e; }
        .label { font-weight: bold; color: #555; display: block; font-size: 0.8em; text-transform: uppercase; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Praktikumsangebote</h1>
    <div id="grid" class="grid">Lade Daten...</div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSso11oiwfev4Yev-kslJ5cLjvMMvTe85HuohBVT1kXoWexWZgcZNLbkYC7q9jRR0e0fLdnmVahY0Ok/pub?gid=0&single=true&output=csv';

        async function ladeDaten() {
            try {
                const response = await fetch(csvUrl);
                const text = await response.text();
                const zeilen = text.split('\n').slice(1);
                const grid = document.getElementById('grid');
                grid.innerHTML = '';

                zeilen.forEach(z => {
                    if(z.trim() === "") return;
                    
                    // Automatische Erkennung: Nimmt Semikolon oder Komma
                    const teile = z.includes(';') ? z.split(';') : z.split(',');

                    const kachel = document.createElement('div');
                    kachel.className = 'kachel';
                    kachel.innerHTML = `
                        <h3>${teile[0] || 'Unbekannte Firma'}</h3>
                        <span class="label">Sparte</span> ${teile[1] || '-'}
                        <span class="label">Branche</span> ${teile[2] || '-'}
                        <span class="label">Ausbildung</span> ${teile[6] || '-'}
                        <hr style="margin:15px 0; border:0; border-top:1px solid #eee;">
                        <small>📞 ${teile[3] || ''} | ✉️ ${teile[4] || ''}</small><br>
                        <small>📍 ${teile[5] || ''}</small>
                    `;
                    grid.appendChild(kachel);
                });
            } catch (e) {
                document.getElementById('grid').innerHTML = "Fehler beim Laden der Daten.";
            }
        }
        ladeDaten();
    </script>
</body>
</html>
