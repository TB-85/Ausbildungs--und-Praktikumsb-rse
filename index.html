<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Praktikumsbörse</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f0f2f5; }
        h1 { text-align: center; color: #333; }
        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .kachel { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-left: 5px solid #0056b3; }
    </style>
</head>
<body>

    <h1>Praktikumsangebote</h1>
    <div id="grid">Lädt Daten...</div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSso11oiwfev4Yev-kslJ5cLjvMMvTe85HuohBVT1kXoWexWZgcZNLbkYC7q9jRR0e0fLdnmVahY0Ok/pub?gid=0&single=true&output=csv';

        async function init() {
            const grid = document.getElementById('grid');
            try {
                const response = await fetch(csvUrl);
                const text = await response.text();
                const zeilen = text.split('\n').slice(1);
                
                grid.innerHTML = ''; // Lade-Text entfernen

                if(zeilen.length === 0 || (zeilen.length === 1 && zeilen[0].trim() === "")) {
                    grid.innerHTML = "<h3>Keine Daten im Sheet gefunden.</h3>";
                    return;
                }

                zeilen.forEach(z => {
                    if(z.trim() === "") return;
                    
                    // Wir teilen die Zeile jetzt flexibler
                    const teile = z.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    const kachel = document.createElement('div');
                    kachel.className = 'kachel';
                    kachel.innerHTML = `
                        <h3>${teile[0] || 'Unbekannt'}</h3>
                        <p><strong>Sparte:</strong> ${teile[1] || '-'}</p>
                        <p><strong>Branche:</strong> ${teile[2] || '-'}</p>
                        <p><strong>Ausbildung:</strong> ${teile[6] || '-'}</p>
                    `;
                    grid.appendChild(kachel);
                });
            } catch (err) {
                grid.innerHTML = "Fehler: " + err.message;
            }
        }
        init();
    </script>
</body>
</html>
